apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: challenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for worker-svc to be reachable and healthy..."
              until wget -qO- http://worker-svc:8080/health >/dev/null 2>&1; do
                echo "  worker not ready, retrying in 3s..."
                sleep 3
              done
              echo "Worker is up."
      containers:
        - name: frontend
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx-conf
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
