apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      initContainers:
        - name: check-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ -z "$DB_PASSWORD" ]; then
                echo "ERROR: DB_PASSWORD is not set. Check the Secret reference."
                exit 1
              fi
              echo "Config OK — DB_PASSWORD is present."
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: password
      containers:
        - name: database
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Database started."
              while true; do
                echo -e "HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK" | nc -l -p 8080
              done
          ports:
            - containerPort: 8080
