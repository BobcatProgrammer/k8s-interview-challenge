apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: challenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-database
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for database-svc to be reachable..."
              until wget -qO- http://database-svc:8080/ >/dev/null 2>&1; do
                echo "  database not ready, retrying in 3s..."
                sleep 3
              done
              echo "Database is up."
      containers:
        - name: api
          image: python:3.11-alpine
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "10Mi"
              cpu: "50m"
            limits:
              memory: "10Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: app-script
              mountPath: /app
      volumes:
        - name: app-script
          configMap:
            name: api-script
