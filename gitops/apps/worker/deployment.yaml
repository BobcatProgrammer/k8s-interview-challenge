apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: challenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for api-svc to be reachable and healthy..."
              until wget -qO- http://api-svc:8080/health >/dev/null 2>&1; do
                echo "  api not ready, retrying in 3s..."
                sleep 3
              done
              echo "API is up."
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Worker started."
              while true; do
                echo -e "HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK" | nc -l -p 8080
              done
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "16Mi"
              cpu: "32"
            limits:
              memory: "32Mi"
